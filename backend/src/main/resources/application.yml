spring:
  application:
    name: task-scheduler

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:scheduler}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: admin
      password: admin

  quartz:
    job-store-type: memory
    properties:
      org.quartz.scheduler.instanceName: TaskScheduler
      org.quartz.threadPool.threadCount: 5

  threads:
    virtual:
      enabled: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.scheduler: DEBUG
    org.quartz: INFO
